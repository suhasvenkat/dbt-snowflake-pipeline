version: 2

models:
  - name: fct_revenue
    description: "Revenue fact table. Incremental — only processes new/updated records. Grain: one row per completed order."
    columns:
      - name: order_id
        description: "Primary key"
        tests:
          - not_null
          - unique
      - name: gross_revenue
        description: "Total order amount in local currency"
        tests:
          - not_null
      - name: order_status
        description: "Order status — only completed orders in this table"
        tests:
          - accepted_values:
              values: ['completed']
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_id

  - name: dim_customer
    description: "Customer dimension. Current state only. Use customer_snapshot for history."
    columns:
      - name: customer_id
        description: "Primary key"
        tests:
          - not_null
          - unique
      - name: email
        tests:
          - not_null
          - unique
      - name: value_segment
        tests:
          - accepted_values:
              values: ['high_value', 'mid_value', 'low_value', 'no_purchases']

  - name: dim_product
    description: "Product dimension. Active products only."
    columns:
      - name: product_id
        description: "Primary key"
        tests:
          - not_null
          - unique
